services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bigfish-smallfish-api
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/bigfish_smallfish
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  db:
    image: postgres:16
    container_name: bigfish-smallfish-db
    environment:
      POSTGRES_DB: bigfish_smallfish
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bigfish_smallfish"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
